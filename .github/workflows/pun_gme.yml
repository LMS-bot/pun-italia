name: Mercati Energetici (cloud, Mac-off) — PUN + Gas PSV

# Gira nei server di GitHub: aggiorna gli storici PUN e Gas e ripubblica la
# pagina su GitHub Pages OGNI GIORNO, indipendentemente dal tuo computer.
# Nessun secret, nessuna API key (portale GME pubblico).

on:
  schedule:
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch: {}

concurrency:
  group: pun-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install requests matplotlib

      - name: Scarica PUN + Gas di oggi e rigenera la pagina
        run: python pun_gme.py --date today --chart --viewer index.html

      - name: Committa e pubblica
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html pun_storico.csv gas_storico.csv pun_gme.json pun_gme_profilo.png
          git diff --cached --quiet || git commit -m "Mercati energetici aggiornati $(date -u +%F)"
          git push
